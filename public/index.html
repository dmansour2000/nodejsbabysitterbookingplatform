<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="welcome">Babysitter Booking Platform Service</title>
    <style>
        /* Basic styling for forms */
        form {
            margin: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            max-width: 300px;
        }
        input, select {
            display: block;
            margin-bottom: 10px;
            width: 100%;
            padding: 8px;
        }
    </style>
</head>
<body>
    <h1 data-i18n="welcome">Welcome to Babysitter Booking Platform Service</h1>
    <div id="login">
        <h2 data-i18n="login">Login</h2>
        <form id="loginForm">
            <input type="text" id="loginUsername" placeholder="Username" data-i18n-placeholder="username" required>
            <input type="password" id="loginPassword" placeholder="Password" data-i18n-placeholder="password" required>
            <button type="submit" data-i18n="login">Login</button>
        </form>
        <p data-i18n="dontHaveAccount">Don't have an account? </p>
        <a href="register.html" data-i18n="registerHere">Register here</a>
    </div>

    <!-- Load i18next from a CDN -->
    <script src="https://unpkg.com/i18next@latest/i18next.min.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Update elements with data-i18n attribute using innerHTML
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.innerHTML = i18next.t(el.getAttribute('data-i18n'));
           });

            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                el.setAttribute('placeholder', i18next.t(el.getAttribute('data-i18n-placeholder')));
            });
        });
    </script>
</body>
</html>
